<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:720px;height:100vh;overflow:hidden}
body{background:#0a0a0a;color:#fff;font-family:'Inter',sans-serif;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 48px}
.tag{font-size:0.7rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#34d399;margin-bottom:32px}
h1{font-family:'Outfit',sans-serif;font-size:3.8rem;font-weight:700;line-height:1.1;letter-spacing:-1.5px;color:#f1f5f9}
h1 span{color:#64748b}
.sub{font-size:1.1rem;color:#475569;margin-top:24px;font-weight:300;line-height:1.7;letter-spacing:0.2px}
</style>
</head>
<body>
<div class="tag">Vision</div>
<h1>A Technological<br><span>Shield.</span></h1>
<p class="sub">For ChatGPT, Claude, and Gemini.</p>

</html>
